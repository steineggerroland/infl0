<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">infl0 PWA icon</title>
  <desc id="desc">Dark rounded square icon with white infl0 wordmark, cyan and magenta glitch offsets, and vertical glitch rain.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101214"/>
      <stop offset="0.52" stop-color="#050607"/>
      <stop offset="1" stop-color="#111315"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="44%" r="70%">
      <stop offset="0" stop-color="#1b1f22" stop-opacity="0.65"/>
      <stop offset="0.62" stop-color="#050607" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00  0 0 0 0 0.85  0 0 0 0 1.00  0 0 0 .55 0" result="cyanGlow"/>
      <feMerge>
        <feMergeNode in="cyanGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.55"/>
    </filter>

    <clipPath id="rounded">
      <rect x="36" y="36" width="440" height="440" rx="88"/>
    </clipPath>

    <style>
      .word {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-weight: 800;
        font-size: 150px;
        letter-spacing: -8px;
        dominant-baseline: middle;
        text-anchor: middle;
      }
      .rain { opacity: .82; shape-rendering: crispEdges; }
      .rain.dim { opacity: .32; }
      .rain.hot { opacity: .95; }
      .slice { shape-rendering: crispEdges; }
    </style>
  </defs>

  <rect x="36" y="36" width="440" height="440" rx="88" fill="url(#bg)"/>
  <rect x="36" y="36" width="440" height="440" rx="88" fill="url(#vignette)"/>
  <rect x="37" y="37" width="438" height="438" rx="87" fill="none" stroke="#23272a" stroke-width="1.5" opacity="0.7"/>

  <g clip-path="url(#rounded)">
    <!-- glitch rain: incoming content stream -->
    <g class="rain">
      <rect x="112" y="116" width="3" height="42" fill="#00e5ff" opacity=".30"/>
      <rect x="128" y="184" width="5" height="78" fill="#ff1f7a" opacity=".65"/>
      <rect x="147" y="132" width="2" height="96" fill="#00e5ff" opacity=".55"/>
      <rect x="166" y="94" width="4" height="22" fill="#ffffff" opacity=".85"/>
      <rect x="181" y="139" width="3" height="136" fill="#00e5ff" opacity=".50"/>
      <rect x="202" y="88" width="5" height="67" fill="#00e5ff" opacity=".80"/>
      <rect x="219" y="157" width="2" height="116" fill="#ffffff" opacity=".60"/>
      <rect x="236" y="103" width="4" height="171" fill="#00e5ff" opacity=".72"/>
      <rect x="252" y="76" width="3" height="210" fill="#ffffff" opacity=".82"/>
      <rect x="271" y="126" width="5" height="83" fill="#ff1f7a" opacity=".75"/>
      <rect x="291" y="98" width="2" height="192" fill="#00e5ff" opacity=".54"/>
      <rect x="311" y="146" width="4" height="145" fill="#ffffff" opacity=".70"/>
      <rect x="333" y="109" width="3" height="63" fill="#ff1f7a" opacity=".70"/>
      <rect x="351" y="84" width="4" height="146" fill="#00e5ff" opacity=".55"/>
      <rect x="373" y="151" width="6" height="90" fill="#ffffff" opacity=".70"/>
      <rect x="396" y="112" width="3" height="132" fill="#ff1f7a" opacity=".65"/>

      <rect class="dim" x="117" y="330" width="3" height="54" fill="#00e5ff"/>
      <rect class="hot" x="149" y="300" width="4" height="95" fill="#ffffff"/>
      <rect class="dim" x="173" y="314" width="2" height="62" fill="#ff1f7a"/>
      <rect x="195" y="286" width="4" height="118" fill="#00e5ff" opacity=".62"/>
      <rect class="hot" x="230" y="300" width="5" height="151" fill="#ffffff"/>
      <rect class="dim" x="260" y="289" width="3" height="98" fill="#00e5ff"/>
      <rect x="284" y="304" width="4" height="74" fill="#ff1f7a" opacity=".76"/>
      <rect class="hot" x="319" y="283" width="3" height="128" fill="#00e5ff"/>
      <rect class="dim" x="347" y="315" width="5" height="54" fill="#ffffff"/>
      <rect x="381" y="292" width="3" height="102" fill="#00e5ff" opacity=".52"/>
    </g>

    <!-- RGB offset wordmark -->
    <text class="word" x="258" y="262" fill="#00e5ff" opacity="0.95" filter="url(#softGlow)">infl0</text>
    <text class="word" x="250" y="255" fill="#ff1f7a" opacity="0.85">infl0</text>
    <text class="word" x="256" y="258" fill="#ffffff" filter="url(#textShadow)">infl0</text>

    <!-- horizontal glitch slices -->
    <g class="slice">
      <rect x="102" y="280" width="28" height="6" fill="#00e5ff" opacity=".62"/>
      <rect x="322" y="219" width="12" height="8" fill="#00e5ff" opacity=".86"/>
      <rect x="338" y="237" width="16" height="6" fill="#ff1f7a" opacity=".85"/>
      <rect x="360" y="256" width="30" height="5" fill="#ffffff" opacity=".78"/>
      <rect x="343" y="279" width="33" height="7" fill="#00e5ff" opacity=".70"/>
      <rect x="393" y="291" width="18" height="5" fill="#ff1f7a" opacity=".78"/>
    </g>

    <!-- small pixel noise -->
    <g shape-rendering="crispEdges">
      <rect x="96" y="176" width="7" height="7" fill="#ffffff" opacity=".8"/>
      <rect x="132" y="101" width="5" height="5" fill="#ff1f7a" opacity=".7"/>
      <rect x="162" y="386" width="5" height="5" fill="#00e5ff" opacity=".6"/>
      <rect x="205" y="414" width="7" height="7" fill="#ff1f7a" opacity=".8"/>
      <rect x="302" y="389" width="5" height="5" fill="#ffffff" opacity=".75"/>
      <rect x="359" y="394" width="7" height="7" fill="#00e5ff" opacity=".65"/>
      <rect x="414" y="183" width="6" height="6" fill="#ff1f7a" opacity=".8"/>
      <rect x="433" y="315" width="5" height="5" fill="#ffffff" opacity=".65"/>
      <rect x="246" y="118" width="5" height="5" fill="#00e5ff" opacity=".75"/>
      <rect x="285" y="154" width="6" height="6" fill="#ff1f7a" opacity=".65"/>
    </g>
  </g>
</svg>
