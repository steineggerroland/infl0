# infl0 + Postgres (Nuxt/Nitro).
# - App container: hostname "postgres", port 5432 (internal network).
# - Prisma/npm on the host: 127.0.0.1 + POSTGRES_HOST_PORT (see .env.example).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-infl0}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-infl0}
    volumes:
      - infl0_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      # If POSTGRES_PASSWORD contains `$`, Compose treats `$x` as a variable (e.g. WARN "z" for `$z`).
      # Fix: use a password without `$`, or set DATABASE_URL in .env to the full URL and reference only that here.
      DATABASE_URL: postgres://${POSTGRES_USER:-infl0}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-infl0}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      NUXT_REGISTRATION_INVITE_CODE: ${NUXT_REGISTRATION_INVITE_CODE:-}
      # n8n / crawler write API (articles, timeline rows); empty = endpoints may reject requests
      NUXT_CRAWLER_API_KEY: ${NUXT_CRAWLER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  infl0_pgdata:
