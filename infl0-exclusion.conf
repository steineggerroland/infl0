# infl0-exclusion.conf
# -----------------------------------------------------------------------------
# ModSecurity runtime tuning for infl0 JSON APIs behind OWASP CRS 4.x.
#
# Goals:
#   1) Keep /api stable (PATCH/DELETE are valid for several endpoints).
#   2) Keep security controls as tight as possible (NO broad attack-tag removal).
#   3) Treat rich-content ingestion separately with narrow body-target exclusions.
#
# Load: include from REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf (or equivalent)
# before CRS rule files.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# 1) METHOD POLICY (fixes CRS 911100 for valid PATCH/DELETE API requests)
# -----------------------------------------------------------------------------
# Apply only on the infl0 host and only on API routes that mutate data.
# Keep this narrow to avoid widening method policy for unrelated paths.
# Replace `example.com` with your public infl0 hostname before production use.
SecRule REQUEST_HEADERS:host "@rx ^example\.com(?::\d+)?$" \
  "id:9000101,phase:1,pass,nolog,tag:'infl0-api-method-policy',ver:'infl0/1.2.0',setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PATCH DELETE',chain"
SecRule REQUEST_URI "@rx ^/api/(me/(ui-prefs|timeline-score-prefs|engagement-tracking)|feeds/[^/]+)$"

# -----------------------------------------------------------------------------
# 2) RICH-CONTENT INGESTION: narrow REQUEST_BODY exclusions only
# -----------------------------------------------------------------------------
# /api/crawler/ingest can legitimately contain article text/code fragments that
# trigger injection signatures as false positives.
#
# IMPORTANT:
# - Keep URL/header/session/auth checks active.
# - Add only concrete rule IDs seen in audit logs.
# - Prefer RemoveTargetById (...;REQUEST_BODY) over rule/tag-wide disables.
#
# Example placeholders (disabled):
# SecRule REQUEST_URI "@rx ^/api/crawler/ingest(?:\?.*)?$" "id:9000110,phase:1,pass,nolog,tag:'infl0-ingest-body-fp',ver:'infl0/1.1.0',ctl:ruleRemoveTargetById=942100;REQUEST_BODY,ctl:ruleRemoveTargetById=941100;REQUEST_BODY"
#
# If your CRS build maps FPs better via tags, still scope to REQUEST_BODY only:
# SecRule REQUEST_URI "@rx ^/api/crawler/ingest(?:\?.*)?$" "id:9000111,phase:1,pass,nolog,tag:'infl0-ingest-body-fp-tagged',ver:'infl0/1.1.0',ctl:ruleRemoveTargetByTag=attack-sqli;REQUEST_BODY"

# -----------------------------------------------------------------------------
# Notes
# -----------------------------------------------------------------------------
# - Unknown /api/... routes are intentionally not matched by the method-policy rule.
# - Keep app-side JSON/schema validation strict; WAF tuning is not validation.
# - Revisit exclusions after CRS upgrades; remove obsolete exceptions quickly.
