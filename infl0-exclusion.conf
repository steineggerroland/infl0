# infl0-exclusion.conf
# -----------------------------------------------------------------------------
# ModSecurity runtime exclusions for infl0 JSON APIs behind OWASP CRS 4.x.
# (CRS 4 rule tags are short names, e.g. tag:'attack-sqli', not
# OWASP_CRS/WEB_ATTACK/SQL_INJECTION.)
#
# Load: include this from REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf (or your
# equivalent *before* CRS phase-2 rules), after SecDefaultAction / engine setup.
#
# Scope: first-party /api routes implemented in this repo (Nitro). Adjust the
# regex if the app is not at the URL root (e.g. prefix /infl0 → ^/infl0/api/).
#
# Endpoints (method → path):
#   GET    /api/health
#   GET    /api/timeline
#   GET    /api/feeds
#   POST   /api/feeds
#   DELETE /api/feeds/:id
#   GET    /api/crawler/sources
#   POST   /api/crawler/ingest
#   POST   /api/cron/recompute-timeline-scores
#   POST   /api/auth/logout
#   GET    /api/auth/me
#   POST   /api/auth/srp/challenge
#   POST   /api/auth/srp/register
#   POST   /api/auth/srp/verify
#   GET    /api/me/ui-prefs
#   PATCH  /api/me/ui-prefs
#   GET    /api/me/timeline-score-prefs
#   PATCH  /api/me/timeline-score-prefs
#   GET    /api/me/personalization-dashboard
#   GET    /api/me/engagement-tracking
#   PATCH  /api/me/engagement-tracking
#   POST   /api/me/article-engagement
#
# Intentionally not matched: unknown /api/... (catch-all 404 only).
#
# Security note: this relaxes CRS *injection-style* families for these paths
# only. Your app must still validate JSON. Prefer upgrading CRS over widening
# exclusions. If something still blocks, use the audit log rule id and add a
# narrow ctl:ruleRemoveById=NNNNNN;REQUEST_BODY (or similar).
# -----------------------------------------------------------------------------

# --- CRS 4.x (OWASP CRS 4.0+): remove common false-positive families on JSON bodies
SecRule REQUEST_URI "@rx ^/api/(?:health|timeline|feeds(?:/[^/?#]*)?|crawler/(?:sources|ingest)|cron/recompute-timeline-scores|auth/(?:logout|me|srp/(?:challenge|register|verify))|me/(?:ui-prefs|timeline-score-prefs|personalization-dashboard|engagement-tracking|article-engagement))(?:\?.*)?$" \
    "id:9000100,\
    phase:2,\
    pass,\
    nolog,\
    tag:'infl0-api-crs4-exclusion',\
    ver:'infl0/1.0.0',\
    ctl:ruleRemoveByTag=attack-sqli,\
    ctl:ruleRemoveByTag=attack-xss,\
    ctl:ruleRemoveByTag=attack-rce,\
    ctl:ruleRemoveByTag=attack-ssrf,\
    ctl:ruleRemoveByTag=attack-injection-generic,\
    ctl:ruleRemoveByTag=attack-injection-php,\
    ctl:ruleRemoveByTag=attack-injection-java"

# Log4j / Log4Shell (944150+) uses tag attack-rce in CRS 4.0 — already covered above.

