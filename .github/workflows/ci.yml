name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm ci

      - name: Prepare Nuxt (generates .nuxt/eslint.config.mjs)
        run: npx nuxt prepare

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Typecheck
        run: npm run typecheck
