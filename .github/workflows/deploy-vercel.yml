name: Deploy Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: vercel-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    environment:
      name: ${{ github.event_name == 'pull_request' && format('preview/pr-{0}', github.event.pull_request.number) || 'production' }}
      url: ${{ steps.deploy.outputs.url }}
    env:
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
      NITRO_PRESET: vercel
      NUXT_CRAWLER_API_KEY: ${{ secrets.NUXT_CRAWLER_API_KEY }}
      NUXT_REGISTRATION_INVITE_CODE: ${{ secrets.NUXT_REGISTRATION_INVITE_CODE }}
      # Operator allowlist for /operator/sources. Defaults to the seeded
      # demo operator so PR reviewers can poke around without setup. Set
      # `NUXT_OPERATOR_EMAILS` as a repo secret to override for a real
      # (non-demo) production instance.
      NUXT_OPERATOR_EMAILS: ${{ secrets.NUXT_OPERATOR_EMAILS || 'operator@localhost' }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm ci

      - name: Set PR branch expiration
        if: github.event_name == 'pull_request'
        run: echo "NEON_EXPIRES_AT=$(date -u -d '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon preview database branch
        id: neon-preview
        if: github.event_name == 'pull_request'
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview-pr-${{ github.event.pull_request.number }}
          database: neondb
          role: neondb_owner
          expires_at: ${{ env.NEON_EXPIRES_AT }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Select database URLs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "DATABASE_URL=$PR_DATABASE_URL_POOLED" >> "$GITHUB_ENV"
            echo "MIGRATION_DATABASE_URL=$PR_DATABASE_URL_DIRECT" >> "$GITHUB_ENV"
          else
            echo "DATABASE_URL=$PRODUCTION_DATABASE_URL" >> "$GITHUB_ENV"
            echo "MIGRATION_DATABASE_URL=$PRODUCTION_DATABASE_URL" >> "$GITHUB_ENV"
          fi
        env:
          PR_DATABASE_URL_POOLED: ${{ steps.neon-preview.outputs.db_url_pooled }}
          PR_DATABASE_URL_DIRECT: ${{ steps.neon-preview.outputs.db_url }}
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Apply database migrations
        run: |
          # Migrations are more reliable on direct Postgres URLs than pooler URLs.
          export DATABASE_URL="$MIGRATION_DATABASE_URL"
          for attempt in 1 2 3; do
            if npm run db:migrate:deploy; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Migration attempt $attempt failed, retrying in 15s..."
              sleep 15
            fi
          done

          echo "Database migrations failed after 3 attempts."
          exit 1

      - name: Seed demo data
        # `.env.e2e` is committed and carries SRP salt/verifier pairs for
        # the seeded demo accounts plus their plaintext passwords
        # (see header of `.env.e2e`). Sourcing it here gives the deploy:
        #   - `dev@localhost` / `infl0-dev-e2e`        (regular user)
        #   - `operator@localhost` / `operator`        (operator role)
        # `prisma db seed` (`prisma/seed.ts`) upserts both users and the
        # `dev@localhost` source-status matrix; `npm run devData` then
        # adds demo articles / timeline rows for `dev@localhost`.
        run: |
          npx dotenv -e .env.e2e -- npx prisma db seed
          npx dotenv -e .env.e2e -- npm run devData
        env:
          ALLOW_DEV_DATA: '1'

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=${{ github.event_name == 'pull_request' && 'preview' || 'production' }} --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        run: npx vercel build ${{ github.event_name == 'pull_request' && '' || '--prod' }} --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          args=(
            --prebuilt
            --token="$VERCEL_TOKEN"
            --env "DATABASE_URL=$DATABASE_URL"
            --env "AUTH_JWT_SECRET=$AUTH_JWT_SECRET"
            --env "NUXT_REGISTRATION_INVITE_CODE=$NUXT_REGISTRATION_INVITE_CODE"
            --env "NUXT_CRAWLER_API_KEY=$NUXT_CRAWLER_API_KEY"
            --env "NUXT_OPERATOR_EMAILS=$NUXT_OPERATOR_EMAILS"
          )

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            args+=(--prod)
          fi

          deploy_output="$(npx vercel deploy "${args[@]}")"
          echo "$deploy_output"
          url="$(printf '%s\n' "$deploy_output" | tail -n 1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment PR preview link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- infl0-vercel-preview -->'
            const url = '${{ steps.deploy.outputs.url }}'
            const neonBranch = 'preview-pr-${{ github.event.pull_request.number }}'
            const body = `${marker}
            Vercel preview is ready:

            ${url}

            Demo logins (seeded from \`.env.e2e\`):
            - User: \`dev@localhost\` / \`infl0-dev-e2e\`
            - Operator (can open \`/operator/sources\`): \`operator@localhost\` / \`operator\`

            Database: isolated Neon preview branch \`${neonBranch}\``

            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })
            const previous = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body?.includes(marker),
            )

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }
