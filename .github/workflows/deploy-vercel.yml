name: Deploy Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: vercel-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: ${{ github.event_name == 'pull_request' && format('preview/pr-{0}', github.event.pull_request.number) || 'production' }}
      url: ${{ steps.deploy.outputs.url }}
    env:
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
      NITRO_PRESET: vercel
      NUXT_CRAWLER_API_KEY: ${{ secrets.NUXT_CRAWLER_API_KEY }}
      NUXT_REGISTRATION_INVITE_CODE: ${{ secrets.NUXT_REGISTRATION_INVITE_CODE }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm ci

      - name: Set PR branch expiration
        if: github.event_name == 'pull_request'
        run: echo "NEON_EXPIRES_AT=$(date -u -d '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon preview database branch
        id: neon-preview
        if: github.event_name == 'pull_request'
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview-pr-${{ github.event.pull_request.number }}
          database: neondb
          role: neondb_owner
          expires_at: ${{ env.NEON_EXPIRES_AT }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Select database URL
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "DATABASE_URL=$PR_DATABASE_URL" >> "$GITHUB_ENV"
          else
            echo "DATABASE_URL=$PRODUCTION_DATABASE_URL" >> "$GITHUB_ENV"
          fi
        env:
          PR_DATABASE_URL: ${{ steps.neon-preview.outputs.db_url_pooled }}
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      - name: Seed demo data
        run: npm run devData
        env:
          ALLOW_DEV_DATA: '1'

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=${{ github.event_name == 'pull_request' && 'preview' || 'production' }} --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        run: npx vercel build ${{ github.event_name == 'pull_request' && '' || '--prod' }} --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          args=(
            --prebuilt
            --token="$VERCEL_TOKEN"
            --env "DATABASE_URL=$DATABASE_URL"
            --env "AUTH_JWT_SECRET=$AUTH_JWT_SECRET"
            --env "NUXT_REGISTRATION_INVITE_CODE=$NUXT_REGISTRATION_INVITE_CODE"
            --env "NUXT_CRAWLER_API_KEY=$NUXT_CRAWLER_API_KEY"
          )

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            args+=(--prod)
          fi

          deploy_output="$(npx vercel deploy "${args[@]}")"
          echo "$deploy_output"
          url="$(printf '%s\n' "$deploy_output" | tail -n 1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment PR preview link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- infl0-vercel-preview -->'
            const url = '${{ steps.deploy.outputs.url }}'
            const neonBranch = 'preview-pr-${{ github.event.pull_request.number }}'
            const body = `${marker}
            Vercel preview is ready:

            ${url}

            Demo login: \`dev@localhost\` / \`dev\`

            Database: isolated Neon preview branch \`${neonBranch}\``

            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })
            const previous = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body?.includes(marker),
            )

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }
