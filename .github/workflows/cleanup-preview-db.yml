name: Cleanup Preview Database

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: read

concurrency:
  group: neon-preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: Delete Neon preview branch
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Delete Neon preview database branch
        uses: neondatabase/delete-branch-action@v3
        continue-on-error: true
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview-pr-${{ github.event.pull_request.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
